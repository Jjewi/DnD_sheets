<!DOCTYPE html>
<html lang="ru">
<head>
      <script src="/static/js/auth-guard.js"></script>
    <script src="/static/js/main.js"></script>
    <meta charset="UTF-8">
    <title>Лист персонажа D&D</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .sheet-container {
            position: relative;
            width: 800px;
            margin: 20px auto;
            background: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .sheet-image {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }
        .sheet-field {
            position: absolute;
            background: transparent;
            border: none;
            padding: 0;
            font-size: 14px;
            box-sizing: border-box;
            color: #000;
            font-weight: bold;
        }
        .sheet-field.readonly {
            background: transparent;
            border: none;
        }
        header {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
        }
        #back-btn, #save-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #back-btn {
            background: #666;
            color: #fff;
        }
        #save-btn {
            background: #4CAF50;
            color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <button id="back-btn">← Назад</button>
        <button id="save-btn">Сохранить</button>
    </header>
   <div class="sheet-container">
