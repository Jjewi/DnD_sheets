<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Персонаж</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="character-page">
    <header>
        <h1 id="form-title">Новый персонаж</h1>
        <button id="back-btn">← Назад</button>
    </header>

    <main>
        <form id="character-form">
            <div class="form-group">
                <label for="name">Имя *</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="race">Раса</label>
                    <input type="text" id="race">
                </div>
                <div class="form-group">
                    <label for="class_name">Класс</label>
                    <input type="text" id="class_name">
                </div>
                <div class="form-group">
                    <label for="experience">Опыт</label>
                    <input type="number" id="experience" value="0" min="0">
                </div>
            </div>
            <div class="form-group">
                <label>Уровень</label>
                <input type="text" id="level" readonly>
            </div>

            <h3>Характеристики</h3>
            <div class="stats-grid">
                <div class="stat">
                    <label>Сила</label>
                    <input type="number" id="strength_score" value="10" min="1" max="30">
                    <span class="modifier" id="strength_modifier">0</span>
                </div>
                <div class="stat">
                    <label>Ловкость</label>
                    <input type="number" id="dexterity_score" value="10" min="1" max="30">
                    <span class="modifier" id="dexterity_modifier">0</span>
                </div>
                <div class="stat">
                    <label>Телосложение</label>
                    <input type="number" id="constitution_score" value="10" min="1" max="30">
                    <span class="modifier" id="constitution_modifier">0</span>
                </div>
                <div class="stat">
                    <label>Интеллект</label>
                    <input type="number" id="intelligence_score" value="10" min="1" max="30">
                    <span class="modifier" id="intelligence_modifier">0</span>
                </div>
                <div class="stat">
                    <label>Мудрость</label>
                    <input type="number" id="wisdom_score" value="10" min="1" max="30">
                    <span class="modifier" id="wisdom_modifier">0</span>
                </div>
                <div class="stat">
                    <label>Харизма</label>
                    <input type="number" id="charisma_score" value="10" min="1" max="30">
                    <span class="modifier" id="charisma_modifier">0</span>
                </div>
            </div>

            <h3>Боевые параметры</h3>
            <div class="combat-grid">
                <div class="form-group">
                    <label>Класс брони</label>
                    <input type="number" id="armour_class" value="10">
                </div>
                <div class="form-group">
                    <label>Скорость</label>
                    <input type="number" id="speed" value="30">
                </div>
                <div class="form-group">
                    <label>Инициатива</label>
                    <input type="number" id="initiative" value="0">
                </div>
                <div class="form-group">
                    <label>Вдохновение</label>
                    <input type="checkbox" id="inspiration">
                </div>
            </div>

            <button type="submit">Сохранить</button>
        </form>
    </main>

    <script src="/static/js/main.js"></script>
</body>
</html>
