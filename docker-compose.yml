version: '3.8'

services:
  db:
    image: postgres:15
    container_name: dnd_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dnd_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dnd_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  app:
    build: .
    container_name: dnd_app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/dnd_db
      SECRET_KEY: "super-secret-key-change-in-production"   # измените на реальный ключ
    depends_on:
      db:
        condition: service_healthy
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: dnd_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com   # логин для входа
      PGADMIN_DEFAULT_PASSWORD: admin          # пароль
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: always

volumes:
  postgres_data: